services:
  - type: web
    name: ai-qa-service
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSIONS
        value: "768"
      - key: RETRIEVAL_LIMIT
        value: "5"
      - key: USE_LOCAL_AI
        value: "false"
